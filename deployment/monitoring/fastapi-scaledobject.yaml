apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fastapi-latency-autoscalar
  namespace: default
spec:
  scaleTargetRef:
    name: fastapi # update with your deployment name
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 30 # check every 30 seconds
  cooldownPeriod: 300 # wait for 5 minutes before scaling down
  triggers: 
  - type: prometheus
    metadata:
      serverAddress: http://prom-kube-prometheus-stack-prometheus.monitoring.svc:9090
      metricName: fastapi_latency_p95
      query: | 
        histogram_quantile(0.95,
        sum(rate(http_request_duration_seconds_bucket{app="fastapi"}[5m])) by (le))
      threshold: "0.5" # scale up if latency exceeds 0.5 seconds
  - type: prometheus
    metadata: 
      serverAddress: http://prom-kube-prometheus-stack-prometheus.monitoring.svc:9090
      metricName: fastapi_request_rate
      query: | 
        sum(rate(http_requests_total[1m]))
      threshold: "1000"